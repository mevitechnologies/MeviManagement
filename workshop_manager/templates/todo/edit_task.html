{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block content %}

<div class="container mt-4">

<div class="card shadow">

    <div class="card-header bg-warning">
        <h4 class="mb-0">
            <i class="bi bi-pencil-square"></i>
            Edit Task
        </h4>
    </div>

    <div class="card-body">

        <form method="post">

            {% csrf_token %}

            {{ form|crispy }}

            <div class="mt-3">

                <button type="submit"
                        class="btn btn-success">
                    <i class="bi bi-check-circle"></i>
                    Save Changes
                </button>

                <a href="{% url 'admin_task_dashboard' %}"
                   class="btn btn-secondary">
                    Cancel
                </a>

            </div>

        </form>

    </div>

</div>

</div>

{% endblock %}
