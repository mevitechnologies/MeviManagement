{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f8f9fa;
            height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            font-family:Segoe UI, sans-serif;
        }

        .error-box{
            text-align:center;
            background:#fff;
            padding:50px;
            border-radius:20px;
            box-shadow:0 10px 30px rgba(0,0,0,.1);
            max-width:600px;
        }

        .error-code{
            font-size:100px;
            font-weight:700;
            color:#dc3545;
        }

        .error-text{
            font-size:24px;
            font-weight:600;
            margin-bottom:15px;
        }

        .error-desc{
            color:#6c757d;
            margin-bottom:30px;
        }

        .home-btn{
            padding:12px 30px;
            border-radius:50px;
        }
    </style>
</head>
<body>

<div class="error-box">

    <div class="error-code">
        404
    </div>

    <div class="error-text">
        Oops! Page Not Found
    </div>

    <p class="error-desc">
        The page you are looking for might have been removed,
        renamed, or is temporarily unavailable.
    </p>

    <a href="{% url 'dashboard' %}" class="btn btn-primary home-btn">
        ← Back to Home
    </a>

</div>

</body>
</html>
